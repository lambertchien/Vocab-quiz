<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vocab Quiz</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeede9;
    --text: #1a1a18; --text2: #6b6b67; --text3: #9b9b96;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --radius: 10px; --radius-lg: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #1c1c1a; --bg2: #252523; --bg3: #2e2e2b; --text: #f0efe9; --text2: #9b9b96; --text3: #6b6b67; --border: rgba(255,255,255,0.10); --border2: rgba(255,255,255,0.20); }
    .tag.syn { background: #1e3012; color: #7fc452; }
    .tag.ant { background: #2e1810; color: #e07050; }
    .tag.zh  { background: #0d2540; color: #6aadee; }
    .status.success { background: #1e3012; color: #7fc452; }
    .status.error   { background: #2e1810; color: #e07050; }
    .quiz-feedback.correct { background: #1e3012; color: #7fc452; }
    .quiz-feedback.wrong   { background: #2e1810; color: #e07050; }
    button.primary { background: #f0efe9; color: #1c1c1a; border-color: #f0efe9; }
    button.primary:hover { opacity: 0.85; }
    .subset-check-row:hover { background: #2a2a28; }
    .mcq-btn:hover:not(:disabled) { background: #2a2a28; }
    .mcq-btn.correct { background: #1e3012; color: #7fc452; border-color: #3B6D11; }
    .mcq-btn.wrong   { background: #2e1810; color: #e07050; border-color: #993C1D; }
    .mcq-btn.reveal  { background: #1e3012; color: #7fc452; border-color: #3B6D11; }
    .edit-panel { background: #252523; border-color: rgba(255,255,255,0.10); }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
  .app { width: 100%; max-width: 620px; background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border); overflow: hidden; }
  .app-header { padding: 1.5rem 1.5rem 0; }
  .app-title { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .app-sub { font-size: 13px; color: var(--text2); margin-bottom: 1.25rem; }
  .tabs { display: flex; border-bottom: 0.5px solid var(--border); padding: 0 1.5rem; }
  .tab { padding: 10px 16px 10px 0; font-size: 14px; cursor: pointer; border: none; background: none; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -0.5px; transition: color 0.15s; }
  .tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }
  .screen { display: none; padding: 1.25rem 1.5rem 1.5rem; }
  .screen.active { display: block; }
  input[type=text], select { width: 100%; padding: 9px 13px; font-size: 14px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); outline: none; transition: border-color 0.15s; }
  input[type=text]:focus, select:focus { border-color: var(--text2); }
  select { cursor: pointer; }
  button { padding: 9px 18px; font-size: 14px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: transparent; color: var(--text); cursor: pointer; transition: background 0.15s; white-space: nowrap; }
  button:hover { background: var(--bg2); }
  button:active { transform: scale(0.98); }
  button:disabled { opacity: 0.4; cursor: default; transform: none; }
  button.primary { background: var(--text); color: var(--bg); border-color: var(--text); }
  button.primary:hover { opacity: 0.85; background: var(--text); }
  .input-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .input-row input { flex: 1; }
  .field-label { font-size: 12px; color: var(--text3); margin-bottom: 5px; margin-top: 12px; }
  .status { font-size: 13px; padding: 9px 13px; border-radius: var(--radius); margin-bottom: 12px; }
  .status.loading { background: var(--bg2); color: var(--text2); }
  .status.error   { background: #FCEBEB; color: #A32D2D; }
  .status.success { background: #EAF3DE; color: #3B6D11; }
  .preview-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 12px; }
  .vocab-word { font-size: 16px; font-weight: 600; color: var(--text); }
  .vocab-def  { font-size: 13px; color: var(--text2); margin-top: 4px; line-height: 1.5; }
  .vocab-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
  .tag { font-size: 11px; padding: 3px 9px; border-radius: 99px; font-weight: 500; cursor: default; }
  .tag.syn { background: #EAF3DE; color: #3B6D11; }
  .tag.ant { background: #FAECE7; color: #993C1D; }
  .tag.zh  { background: #E6F1FB; color: #185FA5; }
  .tag.removable { cursor: pointer; opacity: 0.85; }
  .tag.removable:hover { opacity: 1; text-decoration: line-through; }
  .btn-row { display: flex; gap: 8px; margin-top: 12px; }
  /* lesson cards */
  .lesson-card { border: 0.5px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 10px; overflow: hidden; transition: border-color 0.15s; }
  .lesson-card:hover { border-color: var(--border2); }
  .lesson-card-header { display: flex; justify-content: space-between; align-items: center; padding: 13px 16px; background: var(--bg2); user-select: none; cursor: pointer; }
  .lesson-card-title { font-size: 15px; font-weight: 500; color: var(--text); }
  .lesson-card-meta { display: flex; align-items: center; gap: 10px; }
  .lesson-card-count { font-size: 13px; color: var(--text3); }
  .lesson-card-chevron { font-size: 12px; color: var(--text3); transition: transform 0.2s; }
  .lesson-card-chevron.open { transform: rotate(90deg); }
  .lesson-card-body { display: none; border-top: 0.5px solid var(--border); }
  .lesson-card-body.open { display: block; }
  /* word items */
  .word-list-item { border-bottom: 0.5px solid var(--border); padding: 12px 16px; }
  .word-list-item:last-child { border-bottom: none; }
  .item-header { display: flex; justify-content: space-between; align-items: flex-start; }
  .item-actions { display: flex; gap: 4px; }
  .item-stats { font-size: 12px; color: var(--text3); margin-top: 5px; }
  .item-stats b { color: var(--text2); font-weight: 500; }
  .del-btn  { font-size: 12px; padding: 3px 9px; color: var(--text3); border-color: transparent; }
  .del-btn:hover  { color: #A32D2D; background: #FCEBEB; border-color: transparent; }
  .edit-btn { font-size: 12px; padding: 3px 9px; color: var(--text3); border-color: transparent; }
  .edit-btn:hover { color: var(--text2); background: var(--bg2); border-color: transparent; }
  /* edit panel */
  .edit-panel { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-top: 10px; }
  .edit-panel .field-label { margin-top: 8px; }
  .edit-panel .field-label:first-child { margin-top: 0; }
  .add-tag-row { display: flex; gap: 6px; margin-top: 6px; }
  .add-tag-row input { flex: 1; padding: 6px 10px; font-size: 13px; }
  .add-tag-row button { padding: 6px 12px; font-size: 13px; }
  .empty { text-align: center; color: var(--text3); font-size: 14px; padding: 2.5rem 0; }
  /* quiz setup */
  .section-label { font-size: 13px; color: var(--text2); margin-bottom: 10px; }
  .mode-row { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .mode-btn { flex: 1; text-align: center; min-width: 120px; }
  .mode-btn.selected { background: var(--text); color: var(--bg); border-color: var(--text); }
  .mode-btn.selected:hover { opacity: 0.85; background: var(--text); }
  .subset-picker { border: 0.5px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 1.25rem; overflow: hidden; }
  .subset-picker-header { display: flex; justify-content: space-between; align-items: center; padding: 9px 14px; background: var(--bg2); border-bottom: 0.5px solid var(--border); }
  .subset-picker-title { font-size: 13px; color: var(--text2); }
  .subset-sel-btns { display: flex; gap: 6px; }
  .subset-sel-btns button { font-size: 12px; padding: 4px 10px; }
  .subset-check-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 0.5px solid var(--border); cursor: pointer; transition: background 0.1s; }
  .subset-check-row:last-child { border-bottom: none; }
  .subset-check-row:hover { background: var(--bg2); }
  .subset-check-row input[type=checkbox] { width: 15px; height: 15px; cursor: pointer; accent-color: var(--text); flex-shrink: 0; }
  .subset-check-label { font-size: 14px; color: var(--text); flex: 1; }
  .subset-check-count { font-size: 12px; color: var(--text3); }
  .start-btn { width: 100%; margin-bottom: 8px; }
  .prereq { font-size: 13px; color: var(--text3); text-align: center; }
  /* quiz active */
  .progress { height: 3px; background: var(--bg3); border-radius: 2px; margin-bottom: 4px; }
  .progress-bar { height: 3px; background: var(--text); border-radius: 2px; transition: width 0.3s; }
  .quiz-counter { font-size: 13px; color: var(--text2); margin-bottom: 1.25rem; }
  .quiz-prompt { font-size: 28px; font-weight: 600; color: var(--text); text-align: center; margin: 1.25rem 0 6px; line-height: 1.3; }
  .quiz-hint { font-size: 13px; color: var(--text3); text-align: center; margin-bottom: 1.25rem; }
  .quiz-ans { margin-bottom: 10px; }
  .quiz-feedback { text-align: center; font-size: 14px; font-weight: 500; padding: 10px; border-radius: var(--radius); margin-top: 12px; }
  .quiz-feedback.correct { background: #EAF3DE; color: #3B6D11; }
  .quiz-feedback.wrong   { background: #FCEBEB; color: #A32D2D; }
  .answer-reveal { font-size: 13px; color: var(--text2); margin-top: 8px; text-align: center; line-height: 1.5; }
  /* MCQ */
  .mcq-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .mcq-btn { width: 100%; padding: 14px 12px; font-size: 14px; text-align: center; border-radius: var(--radius); cursor: pointer; transition: background 0.15s, border-color 0.15s; line-height: 1.4; white-space: normal; }
  .mcq-btn:hover:not(:disabled) { background: var(--bg2); }
  .mcq-btn.correct { background: #EAF3DE; color: #3B6D11; border-color: #3B6D11; font-weight: 500; }
  .mcq-btn.wrong   { background: #FCEBEB; color: #A32D2D; border-color: #A32D2D; }
  .mcq-btn.reveal  { background: #EAF3DE; color: #3B6D11; border-color: #3B6D11; }
  /* results */
  .score-big { font-size: 52px; font-weight: 700; text-align: center; margin: 1rem 0 4px; }
  .score-pct { font-size: 15px; color: var(--text2); text-align: center; margin-bottom: 1.5rem; }
  .results-card { background: var(--bg2); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 1rem; }
  .results-label { font-size: 13px; color: var(--text2); margin-bottom: 8px; }
  .results-word  { font-size: 14px; font-weight: 500; padding: 3px 0; color: var(--text); }
</style>
</head>
<body>
<div class="app">
  <div class="app-header">
    <div class="app-title">Vocab Quiz</div>
    <div class="app-sub">Look up words, organise by lesson, quiz yourself.</div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('add')">Add word</button>
    <button class="tab" onclick="showTab('list')">My words</button>
    <button class="tab" onclick="showTab('quiz')">Quiz me</button>
  </div>

  <!-- ADD -->
  <div id="tab-add" class="screen active">
    <div class="field-label" style="margin-top:0">Lesson (optional)</div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:14px">
      <select id="lesson-select" style="flex:1"></select>
      <span style="font-size:13px;color:var(--text3);flex-shrink:0">or new:</span>
      <input type="text" id="lesson-new" placeholder="e.g. Lesson 4-1" style="flex:1" />
    </div>
    <div class="input-row">
      <input type="text" id="word-input" placeholder="Enter a word (e.g. ephemeral)" onkeydown="if(event.key==='Enter')lookupWord()" />
      <button class="primary" onclick="lookupWord()" id="lookup-btn">Look up</button>
    </div>
    <div id="lookup-status"></div>
    <div id="preview-card" class="preview-card" style="display:none">
      <div class="vocab-word" id="preview-word"></div>
      <div class="vocab-def" id="preview-def"></div>

      <div class="field-label">Chinese translation</div>
      <input type="text" id="preview-zh" placeholder="Auto-filled — edit if needed" />

      <div class="field-label">Synonyms <span style="font-weight:400;color:var(--text3)">(click tag to remove)</span></div>
      <div class="vocab-tags" id="preview-syn-tags"></div>
      <div class="add-tag-row">
        <input type="text" id="preview-syn-input" placeholder="Add synonym..." onkeydown="if(event.key==='Enter')addPreviewTag('syn')" />
        <button onclick="addPreviewTag('syn')">Add</button>
      </div>

      <div class="field-label">Antonyms <span style="font-weight:400;color:var(--text3)">(click tag to remove)</span></div>
      <div class="vocab-tags" id="preview-ant-tags"></div>
      <div class="add-tag-row">
        <input type="text" id="preview-ant-input" placeholder="Add antonym..." onkeydown="if(event.key==='Enter')addPreviewTag('ant')" />
        <button onclick="addPreviewTag('ant')">Add</button>
      </div>

      <div class="btn-row">
        <button class="primary" onclick="saveWord()">Save word</button>
        <button onclick="clearPreview()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- LIST -->
  <div id="tab-list" class="screen">
    <div id="word-list"></div>
  </div>

  <!-- QUIZ -->
  <div id="tab-quiz" class="screen">
    <div id="quiz-setup">
      <p class="section-label">Quiz mode</p>
      <div class="mode-row">
        <button class="mode-btn selected" id="mode-meaning" onclick="setMode('meaning')">Meaning → word</button>
        <button class="mode-btn" id="mode-chinese" onclick="setMode('chinese')">Chinese → word</button>
        <button class="mode-btn" id="mode-synant" onclick="setMode('synant')">Synonym / antonym</button>
      </div>
      <p class="section-label">Include lessons</p>
      <div class="subset-picker">
        <div class="subset-picker-header">
          <span class="subset-picker-title" id="subset-summary">All lessons selected</span>
          <div class="subset-sel-btns">
            <button onclick="selectAllSubsets()">All</button>
            <button onclick="selectNoneSubsets()">None</button>
          </div>
        </div>
        <div id="subset-list"></div>
      </div>
      <button class="primary start-btn" onclick="startQuiz()" id="start-btn">Start quiz</button>
      <p class="prereq" id="quiz-prereq"></p>
    </div>

    <div id="quiz-active" style="display:none">
      <div class="progress"><div class="progress-bar" id="prog-bar"></div></div>
      <div class="quiz-counter" id="quiz-counter"></div>
      <div class="quiz-prompt" id="quiz-prompt"></div>
      <div class="quiz-hint" id="quiz-hint"></div>
      <!-- type-answer area (meaning / chinese modes) -->
      <div id="type-area">
        <input type="text" class="quiz-ans" id="quiz-ans" placeholder="Your answer..." onkeydown="if(event.key==='Enter')checkAnswer()" />
        <div class="btn-row">
          <button class="primary" onclick="checkAnswer()" id="check-btn">Check</button>
          <button onclick="nextQuestion()" id="next-btn" style="display:none">Next →</button>
          <button onclick="skipQuestion()" id="skip-btn">Skip</button>
        </div>
      </div>
      <!-- MCQ area (synant mode) -->
      <div id="mcq-area" style="display:none">
        <div class="mcq-grid" id="mcq-grid"></div>
        <div class="btn-row">
          <button onclick="nextQuestion()" id="mcq-next-btn" style="display:none">Next →</button>
          <button onclick="skipQuestion()" id="mcq-skip-btn">Skip</button>
        </div>
      </div>
      <div id="quiz-feedback" class="quiz-feedback" style="display:none"></div>
      <div id="answer-reveal" class="answer-reveal" style="display:none"></div>
    </div>

    <div id="quiz-results" style="display:none">
      <div class="score-big" id="final-score"></div>
      <div class="score-pct" id="final-pct"></div>
      <div class="results-card" id="results-detail"></div>
      <button class="primary" style="width:100%" onclick="resetQuiz()">Try again</button>
    </div>
  </div>
</div>

<script>
let vocab = JSON.parse(localStorage.getItem('vocab_quiz_words') || '[]');
let quizMode = 'meaning';
let selectedSubsets = new Set();
let subsetInitialized = false;
let quizQueue = [], quizIdx = 0, correct = 0, wrong = 0, wrongWords = [];
let currentMCQ = null;

function persist() { localStorage.setItem('vocab_quiz_words', JSON.stringify(vocab)); }

function allLessons() {
  const s = new Set();
  vocab.forEach(v => s.add(v.lesson || ''));
  return [...s].sort((a, b) => { if (!a) return 1; if (!b) return -1; return a.localeCompare(b); });
}

function showTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) =>
    t.classList.toggle('active', ['add','list','quiz'][i] === name));
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'list') renderList();
  if (name === 'quiz') renderQuizSetup();
  if (name === 'add') populateLessonSelect();
}

function setStatus(msg, type) {
  const el = document.getElementById('lookup-status');
  el.innerHTML = msg ? `<div class="status ${type}">${msg}</div>` : '';
}

function populateLessonSelect() {
  const sel = document.getElementById('lesson-select');
  const lessons = [...new Set(vocab.map(v => v.lesson).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">— No lesson —</option>' +
    lessons.map(l => `<option value="${l}">${l}</option>`).join('');
}

/* ── preview tag helpers ── */
let previewSyns = [], previewAnts = [];

function renderPreviewTags(type) {
  const arr = type === 'syn' ? previewSyns : previewAnts;
  const el = document.getElementById('preview-' + type + '-tags');
  el.innerHTML = arr.map((w, i) =>
    `<span class="tag ${type} removable" onclick="removePreviewTag('${type}',${i})">${type === 'syn' ? '= ' : '≠ '}${w} ✕</span>`
  ).join('');
}

function addPreviewTag(type) {
  const inp = document.getElementById('preview-' + type + '-input');
  const val = inp.value.trim();
  if (!val) return;
  if (type === 'syn') previewSyns.push(val);
  else previewAnts.push(val);
  inp.value = '';
  renderPreviewTags(type);
}

function removePreviewTag(type, i) {
  if (type === 'syn') previewSyns.splice(i, 1);
  else previewAnts.splice(i, 1);
  renderPreviewTags(type);
}

/* ── lookup ── */
async function lookupWord() {
  const word = document.getElementById('word-input').value.trim();
  if (!word) return;
  const btn = document.getElementById('lookup-btn');
  btn.disabled = true;
  setStatus('Looking up "' + word + '"…', 'loading');
  document.getElementById('preview-card').style.display = 'none';
  try {
    const [dictRes, transRes] = await Promise.all([
      fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`),
      fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=en|zh-TW`)
    ]);
    if (!dictRes.ok) throw new Error('Word not found. Try another spelling.');
    const dictData = await dictRes.json();
    const transData = await transRes.json();
    const entry = dictData[0];
    let definition = '';
    const synSet = new Set(), antSet = new Set();
    for (const m of (entry.meanings || [])) {
      if (!definition && m.definitions?.[0]) definition = m.definitions[0].definition;
      (m.synonyms || []).forEach(s => synSet.add(s));
      (m.antonyms || []).forEach(a => antSet.add(a));
      for (const d of (m.definitions || [])) {
        (d.synonyms || []).forEach(s => synSet.add(s));
        (d.antonyms || []).forEach(a => antSet.add(a));
      }
    }
    const zh = transData.responseData?.translatedText || '';
    previewSyns = [...synSet].slice(0, 6);
    previewAnts = [...antSet].slice(0, 8);
    setStatus('', '');
    document.getElementById('preview-word').textContent = entry.word;
    document.getElementById('preview-def').textContent = definition || 'No definition found.';
    document.getElementById('preview-zh').value = zh;
    renderPreviewTags('syn');
    renderPreviewTags('ant');
    document.getElementById('preview-card')._word = entry.word;
    document.getElementById('preview-card')._def = definition;
    // repopulate but preserve the user's current selection
    const prevLesson = document.getElementById('lesson-select').value;
    populateLessonSelect();
    if (prevLesson) document.getElementById('lesson-select').value = prevLesson;
    document.getElementById('preview-card').style.display = 'block';
  } catch (e) {
    setStatus(e.message || 'Could not look up word. Check your internet connection.', 'error');
  }
  btn.disabled = false;
}

function saveWord() {
  const card = document.getElementById('preview-card');
  if (!card._word) return;
  if (vocab.find(v => v.word.toLowerCase() === card._word.toLowerCase())) {
    setStatus('"' + card._word + '" is already saved.', 'error'); return;
  }
  const newLesson = document.getElementById('lesson-new').value.trim();
  const selLesson = document.getElementById('lesson-select').value;
  const zh = document.getElementById('preview-zh').value.trim();
  vocab.push({
    word: card._word,
    definition: card._def,
    translation: zh,
    synonyms: [...previewSyns],
    antonyms: [...previewAnts],
    lesson: newLesson || selLesson || '',
    correct: 0, wrong: 0
  });
  persist();
  subsetInitialized = false;
  setStatus('"' + card._word + '" saved!' + (newLesson || selLesson ? ' → ' + (newLesson || selLesson) : ''), 'success');
  clearPreview();
  document.getElementById('word-input').value = '';
  document.getElementById('lesson-new').value = '';
}

function clearPreview() {
  document.getElementById('preview-card').style.display = 'none';
  document.getElementById('preview-card')._word = null;
  setStatus('', '');
}

/* ── word list ── */
function renderList() {
  const el = document.getElementById('word-list');
  if (!vocab.length) { el.innerHTML = '<div class="empty">No words yet — add some!</div>'; return; }
  const groups = {};
  vocab.forEach((v, i) => {
    const key = v.lesson || '';
    if (!groups[key]) groups[key] = [];
    groups[key].push({ v, i });
  });
  const sortedKeys = Object.keys(groups).sort((a, b) => { if (!a) return 1; if (!b) return -1; return a.localeCompare(b); });
  el.innerHTML = sortedKeys.map((key, gi) => {
    const items = groups[key];
    return `
    <div class="lesson-card" id="lc-${gi}">
      <div class="lesson-card-header" onclick="toggleLesson(${gi})">
        <div class="lesson-card-title">${key || 'No lesson'}</div>
        <div class="lesson-card-meta">
          <span class="lesson-card-count">${items.length} word${items.length !== 1 ? 's' : ''}</span>
          <span class="lesson-card-chevron" id="chev-${gi}">&#9654;</span>
        </div>
      </div>
      <div class="lesson-card-body" id="lcb-${gi}">
        ${items.map(({ v, i }) => `
          <div class="word-list-item" id="wli-${i}">
            <div class="item-header">
              <div class="vocab-word">${v.word}</div>
              <div class="item-actions">
                <button class="edit-btn" onclick="toggleEdit(${i})">edit</button>
                <button class="del-btn" onclick="deleteWord(${i})">remove</button>
              </div>
            </div>
            <div class="vocab-def">${v.definition}</div>
            <div class="vocab-tags" style="margin-top:6px">
              ${v.translation ? `<span class="tag zh">ZH: ${v.translation}</span>` : ''}
              ${(v.synonyms||[]).map(s=>`<span class="tag syn">= ${s}</span>`).join('')}
              ${(v.antonyms||[]).map(a=>`<span class="tag ant">≠ ${a}</span>`).join('')}
            </div>
            <div class="item-stats">Correct: <b>${v.correct||0}</b> &nbsp; Wrong: <b>${v.wrong||0}</b></div>
            <div class="edit-panel" id="ep-${i}" style="display:none">
              <div class="field-label" style="margin-top:0">Move to lesson</div>
              <div style="display:flex;gap:8px;align-items:center">
                <select id="ep-lesson-${i}" style="flex:1"></select>
                <span style="font-size:13px;color:var(--text3);flex-shrink:0">or new:</span>
                <input type="text" id="ep-lesson-new-${i}" placeholder="New lesson name" style="flex:1" />
              </div>
              <div class="field-label">Chinese translation</div>
              <input type="text" id="ep-zh-${i}" value="${(v.translation||'').replace(/"/g,'&quot;')}" placeholder="Enter translation" />
              <div class="field-label">Synonyms <span style="font-weight:400;color:var(--text3)">(click to remove)</span></div>
              <div class="vocab-tags" id="ep-syn-tags-${i}"></div>
              <div class="add-tag-row">
                <input type="text" id="ep-syn-input-${i}" placeholder="Add synonym..." onkeydown="if(event.key==='Enter')addWordTag(${i},'syn')" />
                <button onclick="addWordTag(${i},'syn')">Add</button>
              </div>
              <div class="field-label">Antonyms <span style="font-weight:400;color:var(--text3)">(click to remove)</span></div>
              <div class="vocab-tags" id="ep-ant-tags-${i}"></div>
              <div class="add-tag-row">
                <input type="text" id="ep-ant-input-${i}" placeholder="Add antonym..." onkeydown="if(event.key==='Enter')addWordTag(${i},'ant')" />
                <button onclick="addWordTag(${i},'ant')">Add</button>
              </div>
              <div class="btn-row">
                <button class="primary" onclick="saveEdit(${i})">Save</button>
                <button onclick="toggleEdit(${i})">Cancel</button>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>`;
  }).join('');
}

function toggleLesson(gi) {
  const body = document.getElementById('lcb-' + gi);
  const chev = document.getElementById('chev-' + gi);
  const open = body.classList.toggle('open');
  chev.classList.toggle('open', open);
}

function toggleEdit(i) {
  const panel = document.getElementById('ep-' + i);
  const visible = panel.style.display !== 'none';
  if (visible) { panel.style.display = 'none'; return; }
  renderWordTags(i);
  // populate lesson dropdown
  const sel = document.getElementById('ep-lesson-' + i);
  if (sel) {
    const lessons = [...new Set(vocab.map(v => v.lesson).filter(Boolean))].sort();
    const cur = vocab[i].lesson || '';
    sel.innerHTML = '<option value="">— No lesson —</option>' +
      lessons.map(l => `<option value="${l}" ${l === cur ? 'selected' : ''}>${l}</option>`).join('');
  }
  panel.style.display = 'block';
}

function renderWordTags(i) {
  const v = vocab[i];
  ['syn','ant'].forEach(type => {
    const arr = type === 'syn' ? (v.synonyms||[]) : (v.antonyms||[]);
    const el = document.getElementById('ep-' + type + '-tags-' + i);
    if (!el) return;
    el.innerHTML = arr.map((w, j) =>
      `<span class="tag ${type} removable" onclick="removeWordTag(${i},'${type}',${j})">${type==='syn'?'= ':'≠ '}${w} ✕</span>`
    ).join('');
  });
}

function addWordTag(i, type) {
  const inp = document.getElementById('ep-' + type + '-input-' + i);
  const val = inp.value.trim();
  if (!val) return;
  if (type === 'syn') { vocab[i].synonyms = vocab[i].synonyms || []; vocab[i].synonyms.push(val); }
  else { vocab[i].antonyms = vocab[i].antonyms || []; vocab[i].antonyms.push(val); }
  inp.value = '';
  persist();
  renderWordTags(i);
}

function removeWordTag(i, type, j) {
  if (type === 'syn') vocab[i].synonyms.splice(j, 1);
  else vocab[i].antonyms.splice(j, 1);
  persist();
  renderWordTags(i);
}

function saveEdit(i) {
  vocab[i].translation = document.getElementById('ep-zh-' + i).value.trim();
  const newLessonName = document.getElementById('ep-lesson-new-' + i).value.trim();
  const selLesson = document.getElementById('ep-lesson-' + i).value;
  vocab[i].lesson = newLessonName || selLesson;
  subsetInitialized = false;
  persist();
  toggleEdit(i);
  renderList();
}

function deleteWord(i) { vocab.splice(i, 1); persist(); renderList(); }

/* ── subset picker ── */
function renderSubsetPicker() {
  const lessons = allLessons();
  if (!subsetInitialized) { lessons.forEach(l => selectedSubsets.add(l)); subsetInitialized = true; }
  for (const s of selectedSubsets) { if (!lessons.includes(s)) selectedSubsets.delete(s); }
  const container = document.getElementById('subset-list');
  if (!lessons.length) { container.innerHTML = '<div style="padding:12px 14px;font-size:13px;color:var(--text3)">No words added yet.</div>'; return; }
  container.innerHTML = lessons.map(l => {
    const label = l || 'No lesson';
    const count = vocab.filter(v => (v.lesson || '') === l).length;
    const safeL = l.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    return `<label class="subset-check-row">
      <input type="checkbox" ${selectedSubsets.has(l) ? 'checked' : ''} onchange="toggleSubset('${safeL}', this.checked)" />
      <span class="subset-check-label">${label}</span>
      <span class="subset-check-count">${count} word${count !== 1 ? 's' : ''}</span>
    </label>`;
  }).join('');
  updateSubsetSummary();
}

function toggleSubset(lesson, checked) {
  if (checked) selectedSubsets.add(lesson); else selectedSubsets.delete(lesson);
  updateSubsetSummary(); updatePrereq();
}
function selectAllSubsets() { allLessons().forEach(l => selectedSubsets.add(l)); renderSubsetPicker(); updatePrereq(); }
function selectNoneSubsets() { selectedSubsets.clear(); renderSubsetPicker(); updatePrereq(); }
function updateSubsetSummary() {
  const total = allLessons().length;
  const sel = [...selectedSubsets].filter(s => allLessons().includes(s)).length;
  document.getElementById('subset-summary').textContent =
    sel === 0 ? 'No lessons selected' : sel === total ? 'All lessons selected' : sel + ' of ' + total + ' lessons selected';
}
function selectedPool() { return vocab.filter(v => selectedSubsets.has(v.lesson || '')); }

function updatePrereq() {
  const prereq = document.getElementById('quiz-prereq');
  const btn = document.getElementById('start-btn');
  const pool = selectedPool();
  if (pool.length === 0) { prereq.textContent = selectedSubsets.size === 0 ? 'Select at least one lesson.' : 'No words in selected lessons.'; btn.disabled = true; return; }
  if (quizMode === 'chinese') {
    const n = pool.filter(v => v.translation).length;
    if (n === 0) { prereq.textContent = 'No Chinese translations in selected lessons.'; btn.disabled = true; return; }
    prereq.textContent = n + ' word' + (n !== 1 ? 's' : '') + ' with Chinese translation ready.';
  } else if (quizMode === 'synant') {
    const n = pool.filter(v => (v.synonyms||[]).length + (v.antonyms||[]).length > 0).length;
    if (n === 0) { prereq.textContent = 'No words with synonyms or antonyms in selected lessons.'; btn.disabled = true; return; }
    prereq.textContent = n + ' word' + (n !== 1 ? 's' : '') + ' with synonyms/antonyms ready.';
  } else {
    prereq.textContent = pool.length + ' word' + (pool.length !== 1 ? 's' : '') + ' ready.';
  }
  btn.disabled = false;
}

function setMode(m) {
  quizMode = m;
  ['meaning','chinese','synant'].forEach(id => document.getElementById('mode-' + id).classList.toggle('selected', m === id));
  updatePrereq();
}

function renderQuizSetup() {
  renderSubsetPicker(); updatePrereq();
  document.getElementById('quiz-setup').style.display = 'block';
  document.getElementById('quiz-active').style.display = 'none';
  document.getElementById('quiz-results').style.display = 'none';
}

/* ── quiz ── */
function startQuiz() {
  let pool = selectedPool();
  if (quizMode === 'chinese') pool = pool.filter(v => v.translation);
  if (quizMode === 'synant') pool = pool.filter(v => (v.synonyms||[]).length + (v.antonyms||[]).length > 0);
  quizQueue = [...pool].sort((a, b) => ((b.wrong||0)-(b.correct||0)) - ((a.wrong||0)-(a.correct||0)));
  quizIdx = 0; correct = 0; wrong = 0; wrongWords = [];
  document.getElementById('quiz-setup').style.display = 'none';
  document.getElementById('quiz-active').style.display = 'block';
  showQuestion();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i+1)); [a[i],a[j]] = [a[j],a[i]]; }
  return a;
}

function buildMCQ(v) {
  // randomly pick syn or ant question
  const hasSyn = (v.synonyms||[]).length > 0;
  const hasAnt = (v.antonyms||[]).length > 0;
  const askSyn = hasSyn && (!hasAnt || Math.random() > 0.5);
  const correctPool = askSyn ? v.synonyms : v.antonyms;
  const correct = correctPool[Math.floor(Math.random() * correctPool.length)];

  // gather distractors: other words' synonyms and antonyms
  const allWords = shuffle(vocab.filter(w => w.word !== v.word));
  const distractors = new Set();
  for (const w of allWords) {
    for (const x of shuffle([...(w.synonyms||[]), ...(w.antonyms||[])])) {
      if (x !== correct) distractors.add(x);
      if (distractors.size >= 3) break;
    }
    if (distractors.size >= 3) break;
  }
  // fallback: use own opposite pool as distractors
  const opposite = askSyn ? (v.antonyms||[]) : (v.synonyms||[]);
  for (const x of opposite) { if (distractors.size < 3) distractors.add(x); }
  // last resort: generic fillers
  const fillers = ['swift','gloomy','meager','vibrant','hostile','serene','rigid','abundant'];
  for (const x of shuffle(fillers)) { if (distractors.size < 3 && x !== correct) distractors.add(x); }

  const options = shuffle([correct, ...[...distractors].slice(0, 3)]);
  return { askSyn, correct, options, word: v.word };
}

function showQuestion() {
  const v = quizQueue[quizIdx];
  const total = quizQueue.length;
  document.getElementById('quiz-counter').textContent = `Question ${quizIdx + 1} of ${total}`;
  document.getElementById('prog-bar').style.width = (quizIdx / total * 100) + '%';
  document.getElementById('quiz-feedback').style.display = 'none';
  document.getElementById('answer-reveal').style.display = 'none';

  const typeArea = document.getElementById('type-area');
  const mcqArea = document.getElementById('mcq-area');

  if (quizMode === 'synant') {
    typeArea.style.display = 'none';
    mcqArea.style.display = 'block';
    currentMCQ = buildMCQ(v);
    document.getElementById('quiz-prompt').textContent = v.word;
    document.getElementById('quiz-hint').textContent = currentMCQ.askSyn ? 'Choose a synonym' : 'Choose an antonym';
    const grid = document.getElementById('mcq-grid');
    grid.innerHTML = currentMCQ.options.map(opt =>
      `<button class="mcq-btn" onclick="checkMCQ('${opt.replace(/'/g,"\\'")}', this)">${opt}</button>`
    ).join('');
    document.getElementById('mcq-next-btn').style.display = 'none';
    document.getElementById('mcq-skip-btn').style.display = 'inline-block';
  } else {
    typeArea.style.display = 'block';
    mcqArea.style.display = 'none';
    if (quizMode === 'meaning') {
      document.getElementById('quiz-prompt').textContent = v.definition;
      document.getElementById('quiz-hint').textContent = 'Type the English word';
    } else {
      document.getElementById('quiz-prompt').textContent = v.translation;
      document.getElementById('quiz-hint').textContent = 'Type the English word';
    }
    document.getElementById('quiz-ans').value = '';
    document.getElementById('check-btn').style.display = 'inline-block';
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('skip-btn').style.display = 'inline-block';
    document.getElementById('quiz-ans').focus();
  }
}

function checkMCQ(chosen, btnEl) {
  const v = quizQueue[quizIdx];
  const isCorrect = chosen === currentMCQ.correct;
  document.querySelectorAll('.mcq-btn').forEach(b => b.disabled = true);
  btnEl.classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) {
    document.querySelectorAll('.mcq-btn').forEach(b => {
      if (b.textContent === currentMCQ.correct) b.classList.add('reveal');
    });
    v.wrong = (v.wrong||0) + 1; wrong++; wrongWords.push(v.word);
  } else {
    v.correct = (v.correct||0) + 1; correct++;
  }
  const fb = document.getElementById('quiz-feedback');
  fb.style.display = 'block';
  fb.className = 'quiz-feedback ' + (isCorrect ? 'correct' : 'wrong');
  fb.textContent = isCorrect ? 'Correct!' : `Not quite — the answer is "${currentMCQ.correct}"`;
  persist();
  document.getElementById('mcq-next-btn').style.display = 'inline-block';
  document.getElementById('mcq-skip-btn').style.display = 'none';
}

function checkAnswer() {
  const v = quizQueue[quizIdx];
  const ans = document.getElementById('quiz-ans').value.trim().toLowerCase();
  if (!ans) return;
  const isCorrect = ans === v.word.toLowerCase();
  const fb = document.getElementById('quiz-feedback');
  fb.style.display = 'block';
  fb.className = 'quiz-feedback ' + (isCorrect ? 'correct' : 'wrong');
  fb.textContent = isCorrect ? 'Correct!' : 'Not quite.';
  if (!isCorrect) {
    const reveal = document.getElementById('answer-reveal');
    reveal.style.display = 'block';
    reveal.innerHTML = `Answer: <strong>${v.word}</strong>`;
    v.wrong = (v.wrong||0) + 1; wrong++; wrongWords.push(v.word);
  } else { v.correct = (v.correct||0) + 1; correct++; }
  persist();
  document.getElementById('check-btn').style.display = 'none';
  document.getElementById('next-btn').style.display = 'inline-block';
  document.getElementById('skip-btn').style.display = 'none';
}

function skipQuestion() {
  quizQueue[quizIdx].wrong = (quizQueue[quizIdx].wrong||0) + 1;
  wrong++; wrongWords.push(quizQueue[quizIdx].word);
  persist(); nextQuestion();
}

function nextQuestion() {
  quizIdx++;
  if (quizIdx >= quizQueue.length) { showResults(); return; }
  showQuestion();
}

function showResults() {
  document.getElementById('quiz-active').style.display = 'none';
  document.getElementById('quiz-results').style.display = 'block';
  const total = correct + wrong;
  document.getElementById('final-score').textContent = correct + ' / ' + total;
  document.getElementById('final-pct').textContent = Math.round(correct / total * 100) + '% correct';
  const detail = document.getElementById('results-detail');
  detail.innerHTML = wrongWords.length
    ? `<div class="results-label">Words to review:</div>` + wrongWords.map(w => `<div class="results-word">${w}</div>`).join('')
    : `<div style="text-align:center;color:#3B6D11;font-weight:500;padding:0.5rem 0">Perfect score!</div>`;
}

function resetQuiz() {
  document.getElementById('quiz-results').style.display = 'none';
  renderQuizSetup();
}
</script>
</body>
</html>
